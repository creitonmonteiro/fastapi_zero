name: Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/_test.yml
    secrets: inherit

  build:
    needs: test
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/_build.yml
    secrets: inherit

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/_deploy.yml
    with:
      image_tag: ${{ needs.build.outputs.image_tag }}
    secrets: inherit

  k6:
    needs: deploy
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/_k6.yml
    secrets: inherit