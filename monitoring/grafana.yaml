apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: task-manager
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus-ds
        type: prometheus
        access: proxy
        url: http://prometheus-service:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: task-manager
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: Task Manager Dashboards
        orgId: 1
        folder: Task Manager
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-task-manager
  namespace: task-manager
data:
  task-manager-overview.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus-ds"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "id": 1,
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "single"}},
          "targets": [
            {
              "expr": "sum by (handler, method) (rate(http_requests_total{job=\"task-manager-app\"}[1m]))",
              "legendFormat": "{{method}} {{handler}}",
              "refId": "A"
            }
          ],
          "title": "App Requests per Minute",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus-ds"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "unit": "s"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "id": 2,
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "single"}},
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le, handler, method) (rate(http_request_duration_seconds_bucket{job=\"task-manager-app\"}[5m])))",
              "legendFormat": "{{method}} {{handler}}",
              "refId": "A"
            }
          ],
          "title": "App p95 Latency",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus-ds"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "unit": "bytes"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "id": 3,
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "targets": [
            {
              "expr": "sum(process_resident_memory_bytes{job=\"task-manager-app\"})",
              "legendFormat": "app memory",
              "refId": "A"
            }
          ],
          "title": "App Memory Usage",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus-ds"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "unit": "short"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "id": 4,
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "targets": [
            {
              "expr": "sum(up{job=\"task-manager-app\"})",
              "legendFormat": "app up targets",
              "refId": "A"
            }
          ],
          "title": "App Targets Up",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus-ds"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "unit": "percentunit"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
          "id": 5,
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"task-manager\",pod=~\"postgres-.*\",container=\"postgres\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "DB CPU Usage",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus-ds"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "unit": "bytes"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
          "id": 6,
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"task-manager\",pod=~\"postgres-.*\",container=\"postgres\"}) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "DB Memory Usage",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus-ds"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "unit": "short"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 24},
          "id": 7,
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "targets": [
            {
              "expr": "max(kube_pod_container_status_ready{namespace=\"task-manager\",pod=~\"postgres-.*\",container=\"postgres\"})",
              "legendFormat": "postgres ready",
              "refId": "A"
            }
          ],
          "title": "DB Ready Status",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus-ds"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "unit": "short"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 24},
          "id": 8,
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "targets": [
            {
              "expr": "sum(kube_pod_container_status_restarts_total{namespace=\"task-manager\",pod=~\"postgres-.*\",container=\"postgres\"})",
              "legendFormat": "postgres restarts",
              "refId": "A"
            }
          ],
          "title": "DB Restart Count",
          "type": "timeseries"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["task-manager", "app", "database"],
      "templating": {"list": []},
      "time": {"from": "now-15m", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "Task Manager App + DB Overview",
      "uid": "task-manager-overview",
      "version": 2,
      "weekStart": ""
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: task-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:12.0.2
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-secrets
                  key: GRAFANA_ADMIN_USER
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secrets
                  key: GRAFANA_ADMIN_PASSWORD
            - name: GF_SECURITY_DISABLE_INITIAL_ADMIN_PASSWORD_CHANGE
              value: "true"
          ports:
            - containerPort: 3000
              name: web
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources/datasource.yml
              subPath: datasource.yml
            - name: grafana-dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml
              subPath: dashboards.yml
            - name: grafana-dashboard-task-manager
              mountPath: /var/lib/grafana/dashboards/task-manager-overview.json
              subPath: task-manager-overview.json
            - name: grafana-storage
              mountPath: /var/lib/grafana
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: grafana-dashboard-task-manager
          configMap:
            name: grafana-dashboard-task-manager
        - name: grafana-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: task-manager
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
      protocol: TCP
      name: web